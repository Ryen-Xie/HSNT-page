<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>华商暖通 | HSNT ltd.co</title>
    <!-- 苹果/硅谷御用字体 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a0a0a;
            color: white;
            overflow: hidden;
        }

        /* 页面加载淡入动画 */
        body {
            opacity: 0;
            animation: fadeIn 1.2s ease-out forwards;
        }

        @keyframes fadeIn {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        /* 全屏视频背景 */
        .video-container {
            position: fixed;
            width: 100vw;
            height: 100vh;
            top: 0;
            left: 0;
            z-index: -10;
        }

        .video-container video {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 视频渐变遮罩 */
        .video-overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.4), rgba(0,0,0,0.7));
        }

        /* 核心内容居中 */
        main {
            position: fixed;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0 20px;
        }

        /* 主标题 - 修改部分 */
        .brand-title {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-weight: 700;
            text-shadow: 0 0 15px rgba(255,255,255,0.1);
            margin-bottom: 12px;
            user-select: none;
            text-align: center;
        }

        /* 第一行：华商暖通 */
        .brand-chinese {
            font-size: clamp(3rem, 10vw, 8rem);
            letter-spacing: 0.1em;
            line-height: 1.1;
        }

        /* 第二行：HSNT ltd.co */
        .brand-english {
            font-size: clamp(0.8rem, 2.5vw, 1.8rem);
            font-weight: 400;
            letter-spacing: 0.5em; /* 超大字间距确保超过中文长度 */
            margin-top: 0.3em;
            color: rgba(255,255,255,0.9);
        }

        /* 展示更多 - 高端隐藏式入口 */
        .show-more {
            font-size: clamp(0.75rem, 1.5vw, 1rem);
            font-weight: 300;
            letter-spacing: 0.1em;
            color: rgba(255,255,255,0.4);
            text-decoration: none;
            transition: all 0.7s ease-out;
            margin-top: 24px;
        }

        .show-more:hover {
            color: rgba(255,255,255,0.9);
        }

        /* 底部版权 */
        footer {
            position: fixed;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.2);
            font-size: 12px;
            letter-spacing: 0.1em;
        }
    </style>
</head>
<body>
    <!-- 🔥 这里是核心修改：调用本地bbb.mp4视频 🔥 -->
    <div class="video-container">
        <video 
            autoplay 
            muted 
            loop 
            playsinline>
            <!-- 仅保留这一行，指向你的本地视频 -->
            <source src="bbb.mp4" type="video/mp4">
        </video>
        <div class="video-overlay"></div>
    </div>

    <!-- 核心文字 - 修改了标题结构 -->
    <main>
        <h1 class="brand-title">
            <span class="brand-chinese">华商暖通</span>
            <span class="brand-english">HSNT ltd.co</span>
        </h1>
        <a href="./showcase.html" class="show-more">展示更多</a>
    </main>

    <!-- 底部版权 -->
    <footer>© 2026 HSNT ltd.co All Rights Reserved</footer>
</body>
</html>
